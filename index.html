<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مساعد Gemini الذكي المتكامل</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Cairo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Cairo', sans-serif;
    }
    /* تخصيص أشرطة التمرير */

      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 9999px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
</head>
<body class="h-full bg-slate-900 text-slate-100 overflow-hidden flex flex-col">

  <!-- التطبيق الرئيسي -->
  <div class="flex h-screen w-full overflow-hidden relative">
    
    <!-- القائمة الجانبية (Sidebar) -->
    <aside id="sidebar" class="fixed inset-y-0 right-0 z-30 w-80 bg-slate-950 border-l border-slate-800 flex flex-col justify-between transition-transform duration-300 transform translate-x-full lg:static lg:translate-x-0">
      
      <!-- رأس القائمة الجانبية -->
      <div class="p-4 border-b border-slate-800 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="bg-gradient-to-tr from-cyan-500 to-blue-600 p-2 rounded-xl shadow-lg shadow-cyan-500/20">
            <!-- Sparkles Icon -->
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
          </div>
          <span class="font-bold text-lg bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">مساعد Gemini</span>
        </div>
        <button onclick="toggleSidebar(false)" class="lg:hidden p-2 rounded-lg hover:bg-slate-800 transition-colors">
          <!-- X Icon -->
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- زر إنشاء محادثة جديدة -->
      <div class="p-4">
        <button onclick="createNewChat()" class="w-full py-3 px-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 rounded-xl font-medium text-sm flex items-center justify-center gap-2 transition-all shadow-md active:scale-[0.98]">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          <span>محادثة جديدة</span>
        </button>
      </div>

      <!-- قائمة المحادثات النشطة -->
      <div class="flex-1 overflow-y-auto px-4 py-2 space-y-2 custom-scrollbar">
        <div class="text-xs font-semibold text-slate-500 px-2 uppercase tracking-wider mb-2">المحادثات الأخيرة</div>
        <div id="chats-list" class="space-y-1">
          <!-- تُدرج هنا المحادثات برمجياً -->
        </div>
      </div>

      <!-- ذيل القائمة الجانبية (الإعدادات) -->
      <div class="p-4 border-t border-slate-800 space-y-2">
        <button onclick="openSettingsModal(true)" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-900 transition-colors text-slate-300 hover:text-white text-sm">
          <!-- Settings Icon -->
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="font-medium">الإعدادات والمفتاح</span>
        </button>
        
        <div class="flex items-center gap-2 p-2 rounded-lg bg-slate-900/60 border border-slate-800/80">
          <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
          <span class="text-xs text-slate-400">منظومة Gemini 2.5 نشطة</span>
        </div>
      </div>
    </aside>

    <!-- لوحة المحادثة وعرض المحتوى -->
    <main class="flex-1 flex flex-col h-full bg-slate-900 relative overflow-hidden">
      
      <!-- شريط الأدوات العلوي -->
      <header class="h-16 border-b border-slate-800 flex items-center justify-between px-4 lg:px-8 bg-slate-900/80 backdrop-blur-md z-10">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar(true)" class="lg:hidden p-2 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">
            <!-- Menu Icon -->
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 id="active-chat-title" class="font-semibold text-base lg:text-lg text-white">محادثة جديدة</h1>
        </div>

        <button onclick="openSettingsModal(true)" class="p-2 bg-slate-800 hover:bg-slate-750 text-slate-300 hover:text-white rounded-xl transition-all shadow-sm">
          <!-- Settings Icon -->
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>

      <!-- مساحة عرض الرسائل / الشاشة الترحيبية -->

        <!-- يتم إدراج الرسائل برمجياً هنا -->
      </div>

      <!-- شريط الإدخال وإرفاق الملفات السفلي -->
      <footer class="p-4 border-t border-slate-800 bg-slate-900/80 backdrop-blur-md">
        <div class="max-w-3xl mx-auto space-y-3">
          
          <!-- معاينة الملف المرفق قبل الإرسال -->
          <div id="file-preview-container" class="hidden flex items-center gap-3 p-2 bg-slate-950 border border-slate-850 rounded-2xl w-fit relative animate-bounce-short">
            <div id="file-preview-visual" class="w-12 h-12 rounded-lg bg-slate-900 flex items-center justify-center overflow-hidden border border-slate-800">
              <!-- يُدرج محتوى المعاينة برمجياً (صورة أو أيقونة ملف) -->
            </div>
            <div class="text-right pr-1">
              <p id="file-preview-name" class="text-xs font-semibold text-slate-200 truncate max-w-[200px]"></p>
              <p id="file-preview-status" class="text-[10px] text-emerald-400"></p>
            </div>
            <button onclick="removeAttachedFile()" class="text-slate-400 hover:text-red-400 transition-colors p-1" title="حذف الملف المرفق">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </button>
          </div>

          <form onsubmit="handleSendMessage(event)" class="relative flex items-center bg-slate-950 border border-slate-800 rounded-2xl focus-within:border-cyan-500/50 transition-all p-1.5">
            
            <!-- زر رفع الملفات الخفي -->
            <input type="file" id="file-input" onchange="processAttachedFile(event)" accept="image/*,application/pdf,text/*,application/json" class="hidden">
            
            <button type="button" onclick="document.getElementById('file-input').click()" class="p-3 text-slate-400 hover:text-cyan-400 rounded-xl transition-colors hover:bg-slate-900/60 flex items-center justify-center" title="إرفاق ملف">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
            </button>

            <input type="text" id="input-message" placeholder="اكتب رسالتك، ارفع مستند PDF، كوداً، أو صورة..." class="w-full bg-transparent border-0 focus:ring-0 text-slate-100 placeholder-slate-500 text-sm px-4 py-3 outline-none" autocomplete="off">
            
            <button type="submit" id="send-btn" class="p-3 rounded-xl flex items-center justify-center transition-all bg-slate-900 text-slate-600 cursor-not-allowed">
              <svg class="w-4 h-4 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </button>
          </form>
          <p class="text-[10px] text-center text-slate-500">يدعم المساعد قراءة ملفات الـ PDF، الأكواد البرمجية، والصور بتنسيق Markdown متكامل.</p>
        </div>
      </footer>
    </main>

  </div>

  <!-- شاشة الإعدادات المنبثقة (Modal) -->
  <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div class="bg-slate-950 border border-slate-800 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl animate-in fade-in duration-200">
      
      <!-- رأس نافذة الإعدادات -->
      <div class="p-5 border-b border-slate-800 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <h3 class="font-bold text-lg text-white">إعدادات الاتصال والذكاء</h3>
        </div>
        <button onclick="openSettingsModal(false)" class="p-2 hover:bg-slate-900 rounded-xl text-slate-400 hover:text-white transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- محتوى نافذة الإعدادات -->
      <div class="p-6 space-y-6">
        <div class="space-y-2">
          <label class="text-xs font-semibold text-slate-300 flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m-5 8a2 2 0 01-2-2V9a2 2 0 012-2h3m-1 1v10M9 21h6a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
            <span>مفتاح API الخاص بـ Gemini (AQ. / AIzaSy)</span>
          </label>
          <input type="password" id="api-key-input" placeholder="أدخل مفتاح الـ API هنا..." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-cyan-500 transition-colors">
          <p class="text-[11px] text-slate-500 leading-relaxed">
            تم تطبيق تهيئة خاصة لدعم مفاتيح المصادقة المباشرة التي تبدأ بـ <span class="text-cyan-400 font-bold">AQ.</span> عبر آلية الـ Bearer Token تلقائياً.
          </p>
        </div>

        <div class="space-y-2">
          <label class="text-xs font-semibold text-slate-300 flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span>تعليمات النظام الموجهة (System Instruction)</span>
          </label>
          <textarea id="system-prompt-input" rows="4" placeholder="أدخل توجيهات النظام هنا..." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-cyan-500 transition-colors resize-none"></textarea>
        </div>
      </div>

      <!-- أزرار الحفظ والإغلاق -->
      <div class="p-5 border-t border-slate-800 bg-slate-900/50 flex justify-end gap-3">
        <button onclick="resetDefaultSettings()" class="px-4 py-2.5 hover:bg-slate-800 rounded-xl text-xs font-medium text-slate-400 hover:text-white transition-colors">إعادة ضبط الافتراضي</button>
        <button onclick="saveSettings()" class="px-6 py-2.5 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 rounded-xl text-xs font-semibold text-white shadow-md transition-all">حفظ وإغلاق</button>
      </div>
    </div>
  </div>

  <!-- منطق التطبيق والتفاعل (JavaScript) -->
  <script>
    // الحالات الأساسية للتطبيق
    const USER_PROVIDED_KEY = "AQ.Ab8RN6L3iZw89AokNFUiL3Tx9-HSK_Dmhp_C4EP8ZWZqbae5Fg";
    const DEFAULT_SYSTEM_PROMPT = 'أنت مساعد ذكي، ودود، ومتعاون للغاية. تجيب باللغة العربية الفصحى بدقة ووضوح وتستطيع قراءة وتحليل كافة الملفات والمستندات والأسطر البرمجية والصور التي يرسلها لك المستخدم مع صياغة ردودك بتنسيق Markdown متكامل ومنظم.';

    let chats = [
      { id: '1', title: 'محادثة جديدة أولى', messages: [] }
    ];
    let activeChatId = '1';
    let attachedFile = null;
    let customApiKey = USER_PROVIDED_KEY;
    let systemPrompt = DEFAULT_SYSTEM_PROMPT;

    // تهيئة التطبيق عند فتح الصفحة
    window.onload = function() {
      // ملء قيم المدخلات الافتراضية
      document.getElementById('api-key-input').value = customApiKey;
      document.getElementById('system-prompt-input').value = systemPrompt;
      
      renderChatsList();
      renderActiveChat();
      
      // تفقد نشاط مدخل النص لتغيير حالة زر الإرسال
      const inputMsg = document.getElementById('input-message');
      inputMsg.addEventListener('input', updateSendButtonState);
    };

    // مفسر الـ Markdown المخصص لمعالجة الردود
    function parseMarkdown(text) {
      if (!text) return "";

      let html = text;

      // 1. حماية كتل الأكواد البرمجية الكبيرة (Code Blocks)
      const codeBlocks = [];
      html = html.replace(/```(\w*)\n([\s\S]*?)\n```/g, (match, lang, code) => {
        const placeholder = `__CODE_BLOCK_PLACEHOLDER_${codeBlocks.length}__`;
        codeBlocks.push({ lang, code: code.trim() });
        return placeholder;
      });

      // 2. حماية الأكواد البرمجية السطرية (Inline Code)
      const inlineCodes = [];
      html = html.replace(/`([^`\n]+)`/g, (match, code) => {
        const placeholder = `__INLINE_CODE_PLACEHOLDER_${inlineCodes.length}__`;
        inlineCodes.push(code);
        return placeholder;
      });

      // الهروب من وسوم HTML الأساسية لمنع الاختراق وحفظ التنسيقات
      html = html
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      // 3. العناوين (Headers)
      html = html.replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold text-cyan-400 mt-4 mb-2">$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold text-white border-b border-slate-800 pb-1 mt-5 mb-2">$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1 class="text-2xl font-extrabold text-white mt-6 mb-3">$1</h1>');

      // 4. الخط العريض والمائل (Bold & Italic)
      html = html.replace(/\*\*([\s\S]*?)\*\*/g, '<strong class="font-bold text-cyan-300">$1</strong>');
      html = html.replace(/\*([\s\S]*?)\*/g, '<em class="italic text-slate-300">$1</em>');

      // 5. الخطوط الأفقية الفاصلة
      html = html.replace(/^\s*[-*_]{3,}\s*$/gim, '<hr class="border-slate-800 my-4" />');

      // 6. القوائم غير المرتبة (Unordered Lists)
      html = html.replace(/^\s*[-*+]\s+(.*)$/gim, '<li class="mr-5 list-disc text-slate-300 leading-relaxed">$1</li>');

      // 7. القوائم المرتبة (Ordered Lists)
      html = html.replace(/^\s*(\d+)\.\s+(.*)$/gim, '<li class="mr-5 list-decimal text-slate-300 leading-relaxed">$2</li>');

      // 8. الفقرات والأسطر الجديدة الفاصلة
      html = html.split('\n').map(line => {
        if (line.trim().startsWith('<li') || line.trim().startsWith('<h') || line.trim().startsWith('<hr') || line.trim().startsWith('__CODE_BLOCK_')) {
          return line;
        }
        return line.trim() ? `<p class="mb-2.5 leading-relaxed text-slate-300">${line}</p>` : '';
      }).join('\n');

      // 9. استرجاع الأكواد السطرية
      inlineCodes.forEach((code, idx) => {
        html = html.replace(`__INLINE_CODE_PLACEHOLDER_${idx}__`, `<code class="bg-slate-900 text-cyan-400 px-1.5 py-0.5 rounded font-mono text-xs border border-slate-800">${code}</code>`);
      });

      // 10. استرجاع كتل الأكواد وتشكيلها بقالب مذهل
      codeBlocks.forEach((block, idx) => {
        const uniqueId = `code-block-${idx}-${Date.now()}`;
        const escapedCode = block.code.replace(/`/g, '\\`').replace(/\$/g, '\\$');
        const blockHtml = `
          <div class="my-4 rounded-xl overflow-hidden border border-slate-800 bg-slate-950 font-mono text-sm">
            <div class="bg-slate-900 px-4 py-2 flex justify-between items-center border-b border-slate-850">
              <span class="text-xs text-slate-400 font-semibold flex items-center gap-1.5">
                <span class="w-2.5 h-2.5 rounded-full bg-cyan-500"></span>
                ${block.lang || 'code'}
              </span>
              <button 
                onclick="copyCodeText('${uniqueId}')"
                class="text-xs text-slate-400 hover:text-white flex items-center gap-1 transition-colors px-2 py-1 rounded hover:bg-slate-800"
              >
                نسخ الكود
              </button>
            </div>
            <pre class="p-4 overflow-x-auto text-left" dir="ltr"><code id="${uniqueId}" class="text-emerald-400">${block.code}</code></pre>
          </div>
        `;
        html = html.replace(`__CODE_BLOCK_PLACEHOLDER_${idx}__`, blockHtml);
      });

      return html;
    }

    // دالة نسخ الكود البرمجي المحدود
    function copyCodeText(elementId) {
      const codeElement = document.getElementById(elementId);
      if (codeElement) {
        const text = codeElement.innerText;
        navigator.clipboard.writeText(text).then(() => {
          alert("تم نسخ الكود البرمجي بنجاح!");
        });
      }
    }

    // فتح وإغلاق القائمة الجانبية في الهواتف
    function toggleSidebar(open) {
      const sidebar = document.getElementById('sidebar');
      if (open) {
        sidebar.classList.remove('translate-x-full');
      } else {
        sidebar.classList.add('translate-x-full');
      }
    }

    // فتح وإغلاق شاشة الإعدادات
    function openSettingsModal(show) {
      const modal = document.getElementById('settings-modal');
      if (show) {
        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }
    }

    // حفظ الإعدادات
    function saveSettings() {
      customApiKey = document.getElementById('api-key-input').value.trim();
      systemPrompt = document.getElementById('system-prompt-input').value.trim();
      openSettingsModal(false);
    }

    // إعادة ضبط الإعدادات الافتراضية
    function resetDefaultSettings() {
      document.getElementById('api-key-input').value = USER_PROVIDED_KEY;
      document.getElementById('system-prompt-input').value = DEFAULT_SYSTEM_PROMPT;
      customApiKey = USER_PROVIDED_KEY;

    // إنشاء محادثة جديدة
    function createNewChat() {
      const newId = Date.now().toString();
      const newChat = {
        id: newId,
        title: `محادثة جديدة #${chats.length + 1}`,
        messages: []
      };
      chats.unshift(newChat);
      activeChatId = newId;
      renderChatsList();
      renderActiveChat();
      toggleSidebar(false);
    }

    // حذف محادثة
    function deleteChat(idToDelete, event) {
      event.stopPropagation();
      chats = chats.filter(c => c.id !== idToDelete);
      if (chats.length === 0) {
        chats = [{ id: '1', title: 'محادثة جديدة', messages: [] }];
        activeChatId = '1';
      } else if (activeChatId === idToDelete) {
        activeChatId = chats[0].id;
      }
      renderChatsList();
      renderActiveChat();
    }

    // اختيار محادثة نشطة
    function selectChat(id) {
      activeChatId = id;
      renderChatsList();
      renderActiveChat();
      toggleSidebar(false);
    }

    // تحديث حالة زر الإرسال بناءً على النص والملف
    function updateSendButtonState() {
      const text = document.getElementById('input-message').value.trim();
      const btn = document.getElementById('send-btn');
      if (text || attachedFile) {
        btn.classList.remove('bg-slate-900', 'text-slate-600', 'cursor-not-allowed');
        btn.classList.add('bg-gradient-to-r', 'from-cyan-600', 'to-blue-600', 'text-white', 'active:scale-95');
        btn.disabled = false;
      } else {
        btn.classList.add('bg-slate-900', 'text-slate-600', 'cursor-not-allowed');
        btn.classList.remove('bg-gradient-to-r', 'from-cyan-600', 'to-blue-600', 'text-white', 'active:scale-95');
        btn.disabled = true;
      }
    }

    // معالجة الملفات المرفقة
    function processAttachedFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      const fileSizeMB = file.size / (1024 * 1024);
      if (fileSizeMB > 15) {
        alert("حجم الملف كبير جداً! يرجى اختيار ملف يقل حجمه عن 15 ميغابايت.");
        return;
      }

      const reader = new FileReader();
      reader.onloadend = () => {
        const base64Data = reader.result.split(',')[1];
        attachedFile = {
          name: file.name,
          type: file.type,
          size: (file.size / 1024).toFixed(1) + " KB",
          base64: base64Data,
          previewUrl: file.type.startsWith('image/') ? reader.result : null
        };
        showFilePreview();
        updateSendButtonState();
      };
      reader.readAsDataURL(file);
    }

    // عرض معاينة الملف قبل الإرسال
    function showFilePreview() {
      const container = document.getElementById('file-preview-container');
      const visual = document.getElementById('file-preview-visual');
      const name = document.getElementById('file-preview-name');
      const status = document.getElementById('file-preview-status');

      if (!attachedFile) {
        container.classList.add('hidden');
        return;
      }

      container.classList.remove('hidden');
      name.textContent = attachedFile.name;
      status.textContent = `جاهز للإرسال (${attachedFile.size})`;

      if (attachedFile.previewUrl) {
        visual.innerHTML = `<img src="${attachedFile.previewUrl}" class="w-full h-full object-cover rounded-lg" />`;
      } else {
        visual.innerHTML = `
          <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        `;
      }
    }

    // حذف الملف المرفق
    function removeAttachedFile() {
      attachedFile = null;
      document.getElementById('file-input').value = "";
      showFilePreview();
      updateSendButtonState();
    }

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>

    // إرسال الاقتراح السريع

    // نسخ نص الرسالة بالكامل
    function copyMessageText(index) {
      const activeChat = chats.find(c => c.id === activeChatId) || chats[0];
      const text = activeChat.messages[index].text;
      navigator.clipboard.writeText(text).then(() => {
        alert("تم نسخ الرسالة بنجاح!");
      });

    // استدعاء الـ API من Google لـ Gemini
    async function callGeminiAPI(prompt, history, currentFile) {
      const keyToUse = customApiKey || apiKey;
      if (!keyToUse) {
        throw new Error("يرجى إدخال مفتاح الـ API الخاص بـ Gemini في الإعدادات للبدء.");
      }

      let url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent`;
      const headers = {
        'Content-Type': 'application/json',
      };

      if (keyToUse.startsWith('AQ.')) {
        headers['Authorization'] = `Bearer ${keyToUse}`;
      } else {
        url += `?key=${keyToUse}`;
      }

      // بناء سياق الحوار
      const formattedContents = history.map(msg => {
        const parts = [{ text: msg.text }];
        if (msg.file) {
          parts.push({
            inlineData: {
              mimeType: msg.file.type,
              data: msg.file.base64
            }
          });
        }
        return {
          role: msg.sender === 'user' ? 'user' : 'model',
          parts: parts
        };
      });

      // إضافة الطلب الحالي
      const currentParts = [{ text: prompt }];
      if (currentFile) {
        currentParts.push({
          inlineData: {
            mimeType: currentFile.type,
            data: currentFile.base64
          }
        });
      }

      formattedContents.push({
        role: 'user',
        parts: currentParts
      });

      const payload = {
        contents: formattedContents,
        systemInstruction: systemPrompt ? { parts: [{ text: systemPrompt }] } : undefined
      };

      // تطبيق آلية التراجع الأسي (Exponential Backoff) لعدد 5 محاولات
      const maxRetries = 5;
      let delay = 1000;

      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            const errMsg = errData?.error?.message || `خطأ في الاتصال! الكود: ${response.status}`;
            throw new Error(errMsg);
          }

          const data = await response.json();
          const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (responseText) {
            return responseText;
          } else {
            throw new Error("تلقينا استجابة غير منسقة من الخادم.");
          }
        } catch (error) {
          if (i === maxRetries - 1) {
            throw error;
          }
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    }

    // إرسال الرسالة وبدء التفكير
    async function handleSendMessage(event) {
      if (event) event.preventDefault();

      const inputElement = document.getElementById('input-message');
      const text = inputElement.value.trim();
      
      if (!text && !attachedFile) return;

      const userMessageText = text || (attachedFile ? `مرفق ملف للتحليل: ${attachedFile.name}` : "");
      const currentFile = attachedFile;

      // تفريغ المدخلات فوراً
      inputElement.value = "";
      removeAttachedFile();

      const userMessage = {
        id: Date.now().toString(),
        sender: 'user',
        text: userMessageText,
        file: currentFile,
        timestamp: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
      };

      const activeChat = chats.find(c => c.id === activeChatId) || chats[0];
      activeChat.messages.push(userMessage);

      // تحديث العنوان تلقائياً بناءً على الرسالة الأولى
      if (activeChat.messages.length === 1) {
        const titleText = currentFile ? `تحليل ملف: ${currentFile.name}` : userMessageText;
        activeChat.title = titleText.slice(0, 24) + '...';
        renderChatsList();
      }

      renderActiveChat();
      showThinkingState(true);

      try {
        const botResponse = await callGeminiAPI(userMessageText, activeChat.messages.slice(0, -1), currentFile);
        
        const botMessage = {
          id: (Date.now() + 1).toString(),
          sender: 'bot',
          text: botResponse,
          timestamp: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
        };

        activeChat.messages.push(botMessage);
      } catch (error) {
        console.error(error);
        const errorMessage = {
          id: (Date.now() + 1).toString(),
          sender: 'bot',
          text: `**فشل الاتصال بخوادم جيميناي!** \n\n السبب: ${error.message}`,
          timestamp: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
        };
        activeChat.messages.push(errorMessage);
      } finally {
        showThinkingState(false);
        renderActiveChat();
      }
    }

    // إظهار وإخفاء محاكاة التفكير والتحميل
    function showThinkingState(show) {
      const container = document.getElementById('chat-messages-container');
      const id = 'thinking-loading-indicator';
      const existing = document.getElementById(id);

      if (show) {
        if (existing) return;
        const thinkingEl = document.createElement('div');
        thinkingEl.id = id;
        thinkingEl.className = "flex gap-4 justify-start animate-pulse";
        thinkingEl.innerHTML = `
          <div class="w-10 h-10 rounded-xl bg-cyan-600/20 text-cyan-400 border border-cyan-500/30 flex items-center justify-center flex-shrink-0 shadow-md">
            <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 19.19M20 20h-5v-5"/></svg>
          </div>
          <div class="space-y-2 flex-1">
            <span class="text-xs font-semibold text-slate-400">جاري التفكير وتحليل الملفات...</span>
            <div class="bg-slate-950 border border-slate-850 p-4 rounded-2xl rounded-tl-none w-24 flex justify-center items-center gap-1.5">
              <div class="w-2 h-2 rounded-full bg-cyan-400 animate-bounce"></div>
              <div class="w-2 h-2 rounded-full bg-cyan-400 animate-bounce" style="animation-delay: 150ms"></div>
              <div class="w-2 h-2 rounded-full bg-cyan-400 animate-bounce" style="animation-delay: 300ms"></div>
            </div>
          </div>
        `;
        container.appendChild(thinkingEl);
        container.scrollTop = container.scrollHeight;
      } else {
        if (existing) existing.remove();
      }
    }
  </script>
